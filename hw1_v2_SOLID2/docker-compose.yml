services:
  server:
    build: ./mock-server
    container_name: space-server
    restart: unless-stopped
    networks:
      - space-net
    environment:
      - SERVER_PORT=8082
    ports:
      - "8082:8082"  # Изменено с 8080 на 8082
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  mission-scheduler:
    build:
      context: ./mission-scheduler
      dockerfile: Dockerfile
    image: mission-scheduler:latest
    container_name: mission-scheduler
    restart: unless-stopped
    networks:
      - space-net
    depends_on:
      server:
        condition: service_healthy
    environment:
      - SERVER_URL=http://server:8082/api  # Обновлен порт
      - SERVER_PORT=8083                   # Изменено с 8081 на 8083
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "8083:8083"                        # Изменено с 8081 на 8083
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  space-net:
    driver: bridge
