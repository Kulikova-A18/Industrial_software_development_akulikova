server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: file-storing-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/works/**
        - id: file-analysis-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/reports/**

logging:
  level:
    root: WARN
    com.cosmoscan: INFO
