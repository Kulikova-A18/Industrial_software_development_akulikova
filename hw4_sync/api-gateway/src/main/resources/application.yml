server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: file-storing-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/works/**
          filters:
            - name: CircuitBreaker
              args:
                name: fileStoringServiceCB
                fallbackUri: forward:/fallback/file-storing
        - id: file-analysis-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/reports/**
          filters:
            - name: CircuitBreaker
              args:
                name: fileAnalysisServiceCB
                fallbackUri: forward:/fallback/file-analysis
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

resilience4j:
  circuitbreaker:
    instances:
      fileStoringServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
      fileAnalysisServiceCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    root: WARN
    com.cosmoscan: INFO