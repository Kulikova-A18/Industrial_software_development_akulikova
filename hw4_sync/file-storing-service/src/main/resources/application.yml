server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/file_storing_db
    username: storing_user
    password: storing_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

storage:
  upload-dir: ./uploads

analysis:
  service:
    url: http://localhost:8082/api/internal/analyze

logging:
  level:
    com.cosmoscan: DEBUG
    org.springframework.web: WARN